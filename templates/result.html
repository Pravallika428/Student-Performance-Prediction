<!DOCTYPE html>
<html>
<head>
<title>Prediction Result</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.result-box{
    width:500px;
    padding:50px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
    color:white;
}

.icon{
    font-size:80px;
    margin-bottom:20px;
}

h1{
    font-size:42px;
    margin-bottom:20px;
}

.status{
    font-size:36px;
    font-weight:bold;
    margin:25px 0;
}

.pass{
    color:#00ff88;
}

.fail{
    color:#ff4d4d;
}

.message{
    font-size:18px;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    background:white;
    color:#667eea;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

</style>

</head>
<body>

<div class="result-box">

    <div class="icon">🎉</div>

    <h1>Prediction Result</h1>

    <div class="status">

        {% if prediction == "Pass" %}
            <span class="pass">✅ PASS</span>
        {% else %}
            <span class="fail">❌ FAIL</span>
        {% endif %}

    </div>

    <div class="message">
        Student performance has been predicted successfully.
    </div>

    <a href="/dashboard" class="btn">
        ⬅ Back to Dashboard
    </a>

</div>

</body>
</html>
