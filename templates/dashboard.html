<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        min-height:100vh;
        background:linear-gradient(135deg,#667eea,#764ba2);
    }

    .header{
        text-align:center;
        padding:30px;
        color:white;
    }

    .header h1{
        font-size:45px;
    }

    .header p{
        font-size:20px;
        margin-top:10px;
    }

    .welcome{
        text-align:center;
        color:white;
        font-size:22px;
        margin-top:10px;
    }

    .container{
        width:90%;
        margin:auto;
    }

    .cards{
        display:flex;
        justify-content:center;
        gap:25px;
        flex-wrap:wrap;
        margin-top:30px;
    }

    .card{
        width:240px;
        padding:30px;
        text-align:center;
        border-radius:20px;
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(12px);
        color:white;
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
        transition:0.3s;
    }

    .card:hover{
        transform:translateY(-10px);
    }

    .card h2{
        font-size:40px;
        margin-bottom:10px;
    }

    .card h3{
        font-size:30px;
        margin-bottom:8px;
    }

    .menu{
        display:flex;
        justify-content:center;
        gap:25px;
        flex-wrap:wrap;
        margin-top:50px;
    }

    .menu a{
        text-decoration:none;
        color:#333;
        background:white;
        padding:18px 30px;
        border-radius:40px;
        font-weight:bold;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
        transition:0.3s;
    }

    .menu a:hover{
        background:#4CAF50;
        color:white;
        transform:scale(1.08);
    }

    .footer{
        text-align:center;
        color:white;
        margin-top:60px;
        font-size:18px;
        padding-bottom:20px;
    }

    </style>

</head>

<body>

    <div class="header">
        <h1>🎓 Student Performance Prediction</h1>
        <p>Smart Analytics Dashboard</p>
    </div>

    <div class="welcome">
        Welcome, Student 👋
    </div>

    <div class="container">

        <div class="cards">

            <div class="card">
                <h2>👨‍🎓</h2>
                <h3>100</h3>
                <p>Total Students</p>
            </div>

            <div class="card">
                <h2>📊</h2>
                <h3>50</h3>
                <p>Total Predictions</p>
            </div>

            <div class="card">
                <h2>✅</h2>
                <h3>70%</h3>
                <p>Pass Rate</p>
            </div>

            <div class="card">
                <h2>❌</h2>
                <h3>30%</h3>
                <p>Fail Rate</p>
            </div>

        </div>

        <div class="menu">

            <a href="/home">🚀 Predict</a>

            <a href="/history">📋 History</a>

            <a href="/about">ℹ About</a>

            <a href="/contact">📞 Contact</a>

            <a href="/">🚪 Logout</a>

        </div>

    </div>

    <div class="footer">
        © 2026 Student Performance Prediction System
    </div>

</body>
</html>
